<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シフト提出</title>

<style>
body{
    font-family:sans-serif;
    padding:20px;
}

.row{
    margin-bottom:10px;
}

.day-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
}

.day-label{
    width:90px;
    white-space:nowrap;
}

select{
    margin-right:5px;
}

textarea{
    width:100%;
    margin-top:15px;
    font-size:16px;
}

button{
    margin-right:10px;
    padding:8px 20px;
}

#msg{
    margin-top:10px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>シフト提出</h1>

<div class="row">
<label>
従業員番号：
<input type="text" id="employeeId">
</label>
</div>

<div class="row">
<label>
名前：
<input type="text" id="userName">
</label>
</div>

<div class="row">
<label>
職種：
<select id="jobType">
<option value="">選択してください</option>
<option>キッチン</option>
<option>フロア</option>
<option>どちらでも</option>
</select>
</label>
</div>

<div class="row">
<label>
提出週（月曜）：
<select id="weekSelect"></select>
</label>
</div>

<hr>

<div id="shiftContainer"></div>

<hr>

<button id="createBtn">文章を作成</button>
<button id="copyBtn">コピー</button>

<p id="msg"></p>

<textarea id="result" rows="14" readonly></textarea>

<script src="app.js"></script>

</body>
</html>
